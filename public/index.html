<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Features Dashboard — izam.co</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#080b12; --s1:#0e1219; --s2:#131824; --s3:#1a2030;
  --border:#1e2738; --border2:#26304a;
  --text:#dce6f5; --muted:#566480; --muted2:#7a8db0;
  --accent:#4f8ef7; --cyan:#22d3ee; --green:#10b981;
  --yellow:#f59e0b; --red:#f43f5e; --orange:#fb923c; --purple:#a78bfa;
  --pi:#4f8ef7; --exp:#22d3ee;
  --mono:'JetBrains Mono',monospace; --sans:'Sora',sans-serif;
}
body.light {
  --bg:#f0f2f7; --s1:#ffffff; --s2:#f5f7fb; --s3:#eaecf4;
  --border:#dde1ed; --border2:#c8cede;
  --text:#1a2033; --muted:#8892aa; --muted2:#5a6680;
  --accent:#2563eb; --cyan:#0891b2; --green:#059669;
  --yellow:#d97706; --red:#dc2626; --orange:#ea580c; --purple:#7c3aed;
  --pi:#2563eb; --exp:#0891b2;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-logo{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--accent);letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.hdr-logo span{color:var(--muted);font-weight:400}
.hdr-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:8px}
.upload-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .2s}
.upload-btn:hover{border-color:var(--accent);color:var(--accent)}
.upload-btn input{display:none}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}

/* FILTER BAR */
.fbar{background:var(--s1);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.flabel{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap}
.fgroup{display:flex;gap:3px}
.fbtn{padding:4px 11px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-size:10px;font-family:var(--mono);cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fbtn.ep.active{background:var(--green);border-color:var(--green)}
.fbtn.er.active{background:var(--yellow);border-color:var(--yellow);color:#000}
.fbtn.eu.active{background:var(--muted);border-color:var(--muted);color:#fff}
.fselect{padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--s2);color:var(--text);font-size:10px;font-family:var(--mono);cursor:pointer;outline:none}
.fbar-right{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}

/* MAIN */
.main{padding:22px 28px;display:flex;flex-direction:column;gap:20px}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:15px 16px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--kc,var(--accent)) 0%,transparent 100%)}
.kpi-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:8px}
.kpi-val{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1;color:var(--kc,var(--text))}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:5px;font-family:var(--mono)}
.kpi-sub b{color:var(--muted2)}

/* PENDING REVIEW HIGHLIGHT */
.kpi.rfr-highlight{border-color:var(--yellow);box-shadow:0 0 0 1px rgba(245,158,11,.15),inset 0 0 20px rgba(245,158,11,.03)}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g7030{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.g6040{display:grid;grid-template-columns:3fr 2fr;gap:14px}
.g3070{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.g4060{display:grid;grid-template-columns:2fr 3fr;gap:14px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:18px 20px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;font-family:var(--mono)}
.card-badge{font-size:9px;padding:2px 8px;border-radius:3px;background:var(--s3);color:var(--muted2);font-family:var(--mono);border:1px solid var(--border)}
.chart-wrap{position:relative}

/* DIVIDER */
.sdiv{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.sdiv::after{content:'';flex:1;height:1px;background:var(--border)}

/* FUNNEL */
.funnel{display:flex;flex-direction:column;gap:5px}
.frow{display:flex;align-items:center;gap:8px}
.fname{font-size:10px;font-family:var(--mono);width:126px;flex-shrink:0}
.fbar-outer{flex:1;height:18px;background:var(--s3);border-radius:3px;overflow:hidden}
.fbar-inner{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-family:var(--mono)}
.fpct{font-family:var(--mono);font-size:10px;width:38px;text-align:right}
.fn{font-family:var(--mono);font-size:9px;color:var(--muted);width:32px;text-align:right}

/* TABLES */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;color:var(--muted);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.tbl td{padding:7px 8px;font-size:11px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--s2)}
.rank{font-family:var(--mono);color:var(--muted);font-size:9px}
.sname{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.mono{font-family:var(--mono)}
.scroll-t{max-height:280px;overflow-y:auto}
.scroll-t::-webkit-scrollbar{width:3px}
.scroll-t::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* PILLS */
.pill{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-family:var(--mono);font-weight:500}
.pill-pi{background:rgba(79,142,247,.15);color:var(--pi)}
.pill-exp{background:rgba(34,211,238,.15);color:var(--exp)}
.pill-web{background:rgba(79,142,247,.1);color:var(--accent)}
.pill-mob{background:rgba(86,100,128,.1);color:var(--muted)}

/* HORIZONTAL BAR ROWS */
.hbrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.hbrow:last-child{border-bottom:none}
.hblabel{flex:1;font-size:11px}
.hbbar-w{width:110px;height:4px;background:var(--s3);border-radius:2px;flex-shrink:0}
.hbbar{height:4px;border-radius:2px}
.hbcnt{font-family:var(--mono);font-size:10px;color:var(--muted);width:32px;text-align:right}

/* WRONG DOC: two-column layout */
.wdt-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.wdt-col-title{font-size:9px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* FILE TYPE TILES */
.ft-tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ft-tile{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:12px 10px;text-align:center}
.ft-ext{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:4px}
.ft-rate{font-size:18px;font-weight:700;font-family:var(--mono)}
.ft-lbl{font-size:9px;color:var(--muted);margin-top:1px}
.ft-vol{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:4px}

/* MODE */
.mrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.mrow:last-child{border-bottom:none}
.mlabel{font-size:11px;width:110px}
.mbar-w{flex:1;height:5px;background:var(--s3);border-radius:3px}
.mbar{height:5px;border-radius:3px}
.mval{font-family:var(--mono);font-size:11px;width:55px;text-align:right}

/* RFR AGE */
.age-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.age-bucket{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;text-align:center}
.age-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.age-label{font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:3px}

/* NEW SITES SECTION */
.ns-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.ns-drill{border:1px solid var(--border);border-radius:6px;overflow:hidden}
.ns-drill-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border)}
.ns-drill-title{font-size:10px;font-family:var(--mono);color:var(--muted2)}
.ns-date-sel{padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--s3);color:var(--text);font-size:10px;font-family:var(--mono);outline:none;cursor:pointer}
.ns-list{max-height:260px;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.ns-list::-webkit-scrollbar{width:3px}
.ns-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ns-site{font-size:11px;padding:4px 8px;border-radius:4px;border-left:2px solid;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* QSTAT */
.qrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.qrow:last-child{border-bottom:none}
.qkey{font-size:11px;color:var(--muted2)}
.qval{font-family:var(--mono);font-size:11px}

/* EMPTY */
.empty{text-align:center;color:var(--muted);padding:60px;font-size:12px;font-family:var(--mono)}

/* RISK TABLE */
.risk-row-red td{background:rgba(244,63,94,.04)}
.risk-row-red:hover td{background:rgba(244,63,94,.09)!important}
.risk-row-green td{background:rgba(16,185,129,.03)}
.risk-row-green:hover td{background:rgba(16,185,129,.07)!important}
.risk-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-family:var(--mono);font-weight:600}
.risk-red{background:rgba(244,63,94,.15);color:var(--red)}
.risk-green{background:rgba(16,185,129,.12);color:var(--green)}
.view-more-btn{display:block;width:100%;margin-top:10px;padding:8px;border-radius:5px;border:1px dashed var(--border2);background:transparent;color:var(--muted2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .2s;text-align:center}
.view-more-btn:hover{border-color:var(--accent);color:var(--accent)}

/* TOOLTIP */
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:9px;font-family:var(--mono);cursor:default;flex-shrink:0;position:relative;transition:all .15s;user-select:none}
.info-btn:hover{border-color:var(--accent);color:var(--accent)}
.info-btn .tip{display:none;position:absolute;top:calc(100% + 6px);right:0;width:220px;background:var(--s1);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--muted2);font-family:var(--sans);line-height:1.5;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;font-weight:400;text-transform:none;letter-spacing:0}
.info-btn:hover .tip{display:block}

@media(max-width:1280px){
  .kpi-strip{grid-template-columns:repeat(4,1fr)}
  .g2,.g3,.g7030,.g6040,.g3070,.g4060{grid-template-columns:1fr}
  .ft-tiles{grid-template-columns:repeat(3,1fr)}
  .wdt-cols{grid-template-columns:1fr}
  .ns-layout{grid-template-columns:1fr}
  .age-strip{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body class="light">

<div class="hdr">
  <div style="display:flex;align-items:center;gap:20px">
    <div class="hdr-logo">izam<span>.co</span></div>
    <div class="hdr-title">AI Features Analytics</div>
  </div>
  <div class="hdr-right">
    <button id="themeToggle" onclick="toggleTheme()" style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .2s" onmouseenter="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseleave="this.style.borderColor='var(--border2)';this.style.color='var(--muted2)'">
      <span id="themeIcon">🌙</span><span id="themeLabel">Dark</span>
    </button>
    <label class="upload-btn">
      <div class="live-dot"></div>
      <span id="lblBatch">Upload Batch CSV</span>
      <input type="file" id="csvBatch" accept=".csv">
    </label>
    <label class="upload-btn">
      <div class="live-dot" style="background:var(--cyan);box-shadow:0 0 8px var(--cyan)"></div>
      <span id="lblAction">Upload Action Log CSV</span>
      <input type="file" id="csvAction" accept=".csv">
    </label>
  </div>
</div>

<div class="fbar">
  <span class="flabel">Environment</span>
  <div class="fgroup" id="envBtns">
    <button class="fbtn ep active" data-env="production">production</button>
    <button class="fbtn er" data-env="release">release</button>
    <button class="fbtn eu" data-env="unknown">unknown</button>
    <button class="fbtn" data-env="all">all</button>
  </div>
  <span class="flabel" style="margin-left:8px">Feature</span>
  <div class="fgroup" id="typeBtns">
    <button class="fbtn active" data-type="all">All</button>
    <button class="fbtn" data-type="Purchase Invoice">Purchase Invoice</button>
    <button class="fbtn" data-type="Expense">Expense</button>
  </div>
  <span class="flabel" style="margin-left:8px">Period</span>
  <select class="fselect" id="periodSel">
    <option value="all">All time</option>
    <option value="7">Last 7 days</option>
    <option value="14">Last 14 days</option>
    <option value="30">Last 30 days</option>
  </select>
  <div class="fbar-right" id="dataRange">—</div>
</div>

<div class="main" id="main">
  <div class="empty">Loading data…</div>
</div>

<script>
let isDark = false;
// ══ DATA (injected) ══════════════════════════════
let BATCH_RAW = [];
let ERRORS_RAW = [];
let OVERRIDES_RAW = [];
let BATCHES_RAW = [];
let FIRST_TIMERS = {};
let NEW_DAILY = {};
let RFR_RAW = [];
let RETENTION = {};

let B=[], E=[], O=[], BAT=[], RFR=[];
let activeEnv='production', activeType='all', activePeriod='all';

// ══ FILTERS ══════════════════════════════════════
document.querySelectorAll('#envBtns .fbtn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('#envBtns .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeEnv=btn.dataset.env; applyFilters();
}));
document.querySelectorAll('#typeBtns .fbtn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('#typeBtns .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeType=btn.dataset.type; applyFilters();
}));
document.getElementById('periodSel').addEventListener('change',e=>{activePeriod=e.target.value;applyFilters();});

function applyFilters(){
  let cutoff=null;
  if(activePeriod!=='all'){cutoff=new Date();cutoff.setDate(cutoff.getDate()-parseInt(activePeriod));}
  const envF=r=>(activeEnv==='all'||r.Environment===activeEnv||r.environment===activeEnv);
  const typeF=r=>(activeType==='all'||r.Type===activeType||r.batch_type===activeType);
  const dateF=r=>(!cutoff||!r['Created At']||new Date(r['Created At'])>=cutoff);
  const dateFd=r=>(!cutoff||!r.date||new Date(r.date)>=cutoff);
  B=BATCH_RAW.filter(r=>envF(r)&&typeF(r)&&dateF(r));
  E=ERRORS_RAW.filter(r=>envF(r)&&dateFd(r));
  O=OVERRIDES_RAW.filter(r=>envF(r)&&dateFd(r));
  BAT=BATCHES_RAW.filter(r=>envF(r)&&typeF(r)&&dateFd(r));
  RFR=RFR_RAW.filter(r=>envF(r));
  render();
}

// ══ CSV UPLOAD ════════════════════════════════════
function parseCSVLine(line){
  const res=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){res.push(cur.trim());cur='';}
    else cur+=ch;
  }
  res.push(cur.trim());return res;
}
function parseCSV(text){
  const lines=text.split('\n');
  const headers=parseCSVLine(lines[0]);
  const result=[];
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vals=parseCSVLine(lines[i]);
    const row={};
    headers.forEach((h,idx)=>{let v=vals[idx]??'';if(v===''||v==='nan'||v==='NaN')v=null;row[h]=v;});
    if(row['Created At']&&new Date(row['Created At'])>=today)continue;
    if(row['Cost']!==null)row['Cost']=parseFloat(row['Cost']);
    if(row['Tokens']!==null)row['Tokens']=parseFloat(row['Tokens']);
    try{const m=JSON.parse(row['Meta']||'{}');row['quick_mode']=m.quick_mode!==undefined?String(m.quick_mode):null;}catch{row['quick_mode']=null;}
    try{const f=JSON.parse(row['Files']||'[]');row['filetype']=f.length?f[0].filetype:null;}catch{row['filetype']=null;}
    row['Environment']=row['Environment']||'unknown';
    row['date']=row['Created At']?row['Created At'].substring(0,10):null;
    result.push(row);
  }
  return result;
}
document.getElementById('csvBatch').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;
  document.getElementById('lblBatch').textContent='Uploading…';
  const form=new FormData();form.append('file',file);form.append('type','batch');
  try{
    const res=await fetch('/api/upload',{method:'POST',body:form});
    if(!res.ok)throw new Error(await res.text());
    document.getElementById('lblBatch').textContent=`✓ ${file.name}`;
    await loadData();
  }catch(err){
    document.getElementById('lblBatch').textContent='Upload failed';
    alert('Upload error: '+err.message);
  }
});
document.getElementById('csvAction').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;
  document.getElementById('lblAction').textContent='Uploading…';
  const form=new FormData();form.append('file',file);form.append('type','action');
  try{
    const res=await fetch('/api/upload',{method:'POST',body:form});
    if(!res.ok)throw new Error(await res.text());
    document.getElementById('lblAction').textContent=`✓ ${file.name}`;
    await loadData();
  }catch(err){
    document.getElementById('lblAction').textContent='Upload failed';
    alert('Upload error: '+err.message);
  }
});

function catError(e){
  if(!e)return'Other';const el=e.toLowerCase();
  if(el.includes('rate limit'))return'Rate Limit';
  if(el.includes('context window'))return'Context Window';
  if(el.startsWith('limit_invoice'))return'Too Many Invoices in File';
  if(el.startsWith('limit_expense'))return'Too Many Expenses in File';
  if(el.includes('insufficient'))return'Insufficient Coins';
  if(el.includes('invalid document')||el.includes('invalid input'))return'Wrong Doc Type';
  if((el.includes('supplier')||el.includes('address'))&&(el.includes('not present')||el.includes('not found')||el.includes('not legible')))return'Unreadable Document';
  if(el.includes('undefined')||el.includes('exception')||el.includes('ifplugininstalled'))return'Code Error';
  return'Other';
}
function extractWDT(e){
  if(!e)return null;
  const m=e.match(/found:\s*(.+)$/i);
  if(m)return m[1].replace(/_/g,' ').replace(/\(.*?\)/g,'').trim().toLowerCase();
  return null;
}

// ── RISK TABLE ────────────────────────────────────────────────
let riskAllRows = [];
let riskShowing = 0;
const RISK_PAGE = 15;

function buildRiskRows() {
  // Raw sums per site — no filtering, no exclusions
  // total_tokens and total_aic are direct sums from the data
  // expected_aic = ceil(total_tokens / 1000) — only calculation is for comparison
  const siteMap = {};

  B.forEach(r => {
    const sid = String(r['Site ID']);
    if (!siteMap[sid]) siteMap[sid] = { name: r['Business Name'] || sid, total_tokens: 0, total_aic: 0, jobs: 0, pi: 0, exp: 0 };
    siteMap[sid].total_tokens += r.Tokens || 0;
    siteMap[sid].total_aic    += r.Cost   || 0;
    siteMap[sid].jobs++;
    r.Type === 'Purchase Invoice' ? siteMap[sid].pi++ : siteMap[sid].exp++;
  });

  const rows = Object.entries(siteMap)
    .map(([sid, s]) => {
      const expected_aic = s.total_tokens > 0 ? Math.ceil(s.total_tokens / 1000) : 0;
      const gap          = expected_aic - s.total_aic;
      return { sid, ...s, expected_aic, gap };
    });

  const under    = rows.filter(r => r.gap > 0).sort((a,b) => b.gap - a.gap);
  const balanced = rows.filter(r => r.gap <= 0).sort((a,b) => a.gap - b.gap);
  return [...under, ...balanced];
}

function renderRiskTable(from) {
  riskAllRows = buildRiskRows();
  riskShowing = Math.min(from + RISK_PAGE, Math.min(riskAllRows.length, 100));

  const wrap = document.getElementById('riskTableWrap');
  if (!wrap) return;

  const badge = document.getElementById('riskBadge');
  const underCount = riskAllRows.filter(r=>r.gap>0).length;
  const totalGap = riskAllRows.filter(r=>r.gap>0).reduce((s,r)=>s+r.gap,0).toFixed(1);
  if (badge) badge.textContent = `${underCount} undercharged · total gap ${totalGap} AIC`;

  const thS = `padding:6px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;font-weight:500;text-align:`;

  let t = `<div style="overflow-x:auto"><table class="tbl" style="width:100%"><thead><tr>
    <th style="${thS}left">#</th>
    <th style="${thS}left">Site ID</th>
    <th style="${thS}left">Business</th>
    <th style="${thS}right">Jobs</th>
    <th style="${thS}right">Tokens</th>
    <th style="${thS}right">Expected AIC<br><span style="font-weight:400;color:var(--muted)">(ceil tok÷1000)</span></th>
    <th style="${thS}right">Charged AIC</th>
    <th style="${thS}right">Gap</th>
    <th style="${thS}center">Status</th>
  </tr></thead><tbody>`;

  const slice = riskAllRows.slice(0, riskShowing);
  slice.forEach((r, i) => {
    const isRed = r.gap > 0;
    const rowClass = isRed ? 'risk-row-red' : 'risk-row-green';
    const badgeHtml = isRed
      ? `<span class="risk-badge risk-red">⚠ Undercharged</span>`
      : `<span class="risk-badge risk-green">✓ Balanced</span>`;
    const gapColor = isRed ? 'var(--red)' : 'var(--green)';

    t += `<tr class="${rowClass}">
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:9px;color:var(--muted)">${i+1}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--muted2)">${r.sid}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border)">
        <div style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px" title="${r.name}">${r.name}</div>
        <div style="margin-top:2px">${r.pi?`<span class="pill pill-pi">PI×${r.pi}</span>`:''} ${r.exp?`<span class="pill pill-exp">Exp×${r.exp}</span>`:''}</div>
      </td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);font-size:11px">${r.jobs}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);font-size:11px;color:var(--cyan)">${r.total_tokens.toLocaleString()}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">${r.expected_aic.toLocaleString()}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);font-size:11px;color:var(--purple)">${r.total_aic.toLocaleString()}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);font-size:11px;color:${gapColor};font-weight:600">${r.gap>0?"+":""}${r.gap.toLocaleString()}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:center">${badgeHtml}</td>

  });

  const totalCapped = Math.min(riskAllRows.length, 100);
  if (riskShowing < totalCapped) {
    t += `<button class="view-more-btn" onclick="renderRiskTable(${riskShowing})">
      Load next ${Math.min(RISK_PAGE, totalCapped - riskShowing)} of ${totalCapped - riskShowing} remaining

  } else if (riskShowing >= RISK_PAGE) {
    t += `<div style="margin-top:8px;text-align:center;font-size:9px;color:var(--muted);font-family:var(--mono)">showing ${riskShowing} of ${riskAllRows.length} sites${riskAllRows.length>100?' (capped at 100)':''}</div>`;
  }

  wrap.innerHTML = t;
}

// ── RETENTION RENDERING (fully client-side from B) ──────────
function computeRetention() {
  // Uses filtered B array — always in sync with env/type/period filters
  const today = new Date(); today.setHours(0,0,0,0);

  // first day per site
  const firstDayPi = {}, firstDayExp = {}, firstDayAll = {};
  const siteDaysPi = {}, siteDaysExp = {}, siteDaysAll = {};

  const bSorted = [...B].sort((a,b) => new Date(a['Created At']) - new Date(b['Created At']));
  bSorted.forEach(r => {
    const sid = String(r['Site ID']), dt = r.date;
    if (!dt) return;
    // all
    if (!firstDayAll[sid]) firstDayAll[sid] = dt;
    if (!siteDaysAll[sid]) siteDaysAll[sid] = new Set();
    siteDaysAll[sid].add(dt);
    // by type
    if (r.Type === 'Purchase Invoice') {
      if (!firstDayPi[sid]) firstDayPi[sid] = dt;
      if (!siteDaysPi[sid]) siteDaysPi[sid] = new Set();
      siteDaysPi[sid].add(dt);
    } else {
      if (!firstDayExp[sid]) firstDayExp[sid] = dt;
      if (!siteDaysExp[sid]) siteDaysExp[sid] = new Set();
      siteDaysExp[sid].add(dt);
    }
  });

  // all unique dates in B
  const allDates = [...new Set(B.map(r=>r.date).filter(Boolean))].sort();

  // STICKINESS
  function bucketDays(firstDayMap, siteDaysMap) {
    const b = {'1':0,'2-3':0,'4-7':0,'8+':0};
    Object.keys(firstDayMap).forEach(sid => {
      const n = siteDaysMap[sid] ? siteDaysMap[sid].size : 1;
      if (n===1) b['1']++;
      else if (n<=3) b['2-3']++;
      else if (n<=7) b['4-7']++;
      else b['8+']++;
    });
    return b;
  }
  const stick = {
    all: bucketDays(firstDayAll, siteDaysAll),
    pi:  bucketDays(firstDayPi,  siteDaysPi),
    exp: bucketDays(firstDayExp, siteDaysExp),
  };

  // DAILY RETURN RATE
  const seenAll=new Set(), seenPi=new Set(), seenExp=new Set();
  const dailyReturn = [];
  allDates.forEach(dt => {
    const dayRows = B.filter(r=>r.date===dt);
    const sAll = new Set(dayRows.map(r=>String(r['Site ID'])));
    const sPi  = new Set(dayRows.filter(r=>r.Type==='Purchase Invoice').map(r=>String(r['Site ID'])));
    const sExp = new Set(dayRows.filter(r=>r.Type==='Expense').map(r=>String(r['Site ID'])));
    const ra = [...sAll].filter(s=>seenAll.has(s)).length;
    const rp = [...sPi].filter(s=>seenPi.has(s)).length;
    const re = [...sExp].filter(s=>seenExp.has(s)).length;
    dailyReturn.push({
      date: dt,
      total: sAll.size,
      ret_pct_all: sAll.size ? +(ra/sAll.size*100).toFixed(1) : 0,
      ret_pct_pi:  sPi.size  ? +(rp/sPi.size*100).toFixed(1)  : 0,
      ret_pct_exp: sExp.size ? +(re/sExp.size*100).toFixed(1)  : 0,
    });
    sAll.forEach(s=>seenAll.add(s));
    sPi.forEach(s=>seenPi.add(s));
    sExp.forEach(s=>seenExp.add(s));
  });

  // COHORT TABLE (daily)
  const cohortDays = [...new Set(Object.values(firstDayAll))].sort();
  const cohortRows = cohortDays.map(cd => {
    const sites = Object.keys(firstDayAll).filter(s=>firstDayAll[s]===cd);
    const n = sites.length;
    const cdIdx = allDates.indexOf(cd);
    const retention = allDates.map((ad, colIdx) => {
      const offset = colIdx - cdIdx;
      if (offset < 0) return null;
      if (offset === 0) return 100.0;
      const adDate = new Date(ad+'T00:00:00');
      if (adDate >= today) return null;
      const active = sites.filter(s => siteDaysAll[s] && siteDaysAll[s].has(ad)).length;
      return +(active/n*100).toFixed(1);
    });
    return {day: cd, n, retention};
  });

  // avg per column
  const avg = allDates.map((_, colIdx) => {
    const vals = cohortRows
      .filter(r => {
        const joinIdx = allDates.indexOf(r.day);
        return colIdx > joinIdx && r.retention[colIdx] !== null;
      })
      .map(r => r.retention[colIdx]);
    return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
  });

  return { stick, dailyReturn, cohortTable: { days: allDates, rows: cohortRows, avg } };
}

    <td style="padding:6px 10px;border-bottom:2px solid var(--border2);font-family:var(--mono);font-size:9px;color:var(--text)">Avg Retention</td>
    <td style="padding:6px 10px;border-bottom:2px solid var(--border2);text-align:center;color:var(--muted);font-family:var(--mono)">—</td>
    <td style="padding:6px 10px;border-bottom:2px solid var(--border2);text-align:center;font-family:var(--mono);font-weight:700;color:var(--text)">100%</td>`;
  allWeeks.slice(1).forEach((_,i) => {
    const pct = avg[i+1];
    t += `<td style="padding:6px 10px;border-bottom:2px solid var(--border2);text-align:center;font-family:var(--mono);font-weight:700;background:${cellBg(pct)};color:${cellColor(pct)}">${pct!==null?pct+'%':'—'}</td>`;
  });
  t += `</tr>`;

  rows.forEach(row => {
    const fmt = d => { const dd=new Date(d+'T00:00:00'); return (dd.getMonth()+1)+'/'+(dd.getDate()); };
    t += `<tr>
      <td style="padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--mono);font-size:9px">
        ${fmt(row.day)}<br><span style="color:var(--muted);font-size:8px">${row.n} sites</span></td>
      <td style="padding:6px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--muted2);font-family:var(--mono)">${row.n}</td>`;
    const joinIdx = row.retention.findIndex(v=>v===100.0);
    row.retention.forEach((pct, colIdx) => {
      if (pct===null && colIdx<joinIdx) {
        t += `<td style="padding:6px 10px;border-bottom:1px solid var(--border)"></td>`;
      } else if (pct===null) {
        t += `<td style="padding:6px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--muted);font-family:var(--mono)">N/A</td>`;
      } else if (pct===100.0) {
        t += `<td style="padding:6px 10px;border-bottom:1px solid var(--border);text-align:center;font-family:var(--mono);font-weight:700;color:var(--text);background:var(--s3)">100%</td>`;
      } else {
        t += `<td style="padding:6px 10px;border-bottom:1px solid var(--border);text-align:center;font-family:var(--mono);background:${cellBg(pct)};color:${cellColor(pct)}">${pct}%</td>`;
      }
    });
    t += `</tr>`;
  });

  t += `</tbody></table>`;
  grid.innerHTML = t;
}
// ── LOAD DATA FROM SERVER ──────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error('No data uploaded yet');
    const d = await res.json();
    BATCH_RAW     = d.batch     || [];
    ERRORS_RAW    = d.errors    || [];
    OVERRIDES_RAW = d.overrides || [];
    BATCHES_RAW   = d.batches   || [];
    FIRST_TIMERS  = d.firstTimers || {};
    RFR_RAW       = d.rfr       || [];
    RETENTION     = d.retention  || {};
    updateRange();
    applyFilters();
  } catch(err) {
    document.getElementById('main').innerHTML =
      '<div class="empty">📂 No data yet — upload your CSV files using the buttons above.</div>';
  }
}
loadData();

// ── THEME ──────────────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeIcon').textContent = isDark ? '☀' : '🌙';
  document.getElementById('themeLabel').textContent = isDark ? 'Light' : 'Dark';
  // Re-render charts with new colors
  applyFilters();
}

// Make chart colors theme-aware
const origMkChart = mkChart;
